<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA Calculator — University of Haripur</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #010a04;
    --surface:   rgba(0, 230, 118, 0.04);
    --glass:     rgba(0, 230, 118, 0.06);
    --border:    rgba(0, 230, 118, 0.16);
    --neon:      #00e676;
    --neon2:     #69ff47;
    --neon3:     #ff2d6b;
    --text:      #c8ffd8;
    --muted:     rgba(200,255,216,0.4);
    --danger:    #ff2d6b;
    --warn:      #ffb800;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── Custom Cursor ── */
  #cursor-outer {
    position: fixed; top: 0; left: 0; z-index: 9999;
    pointer-events: none;
    width: 36px; height: 36px;
    border: 1px solid rgba(0,230,118,0.7);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.35s cubic-bezier(0.25,1,0.5,1),
                height 0.35s cubic-bezier(0.25,1,0.5,1),
                background 0.3s, border-color 0.3s, opacity 0.3s;
  }
  #cursor-outer.hovering {
    width: 52px; height: 52px;
    background: rgba(0,230,118,0.06);
    border-color: var(--neon);
    box-shadow: 0 0 18px rgba(0,230,118,0.25);
  }
  #cursor-dot {
    position: fixed; top: 0; left: 0; z-index: 10000;
    pointer-events: none;
    width: 5px; height: 5px;
    background: var(--neon);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 10px var(--neon), 0 0 4px var(--neon2);
    transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
  }
  #cursor-dot.clicking {
    transform: translate(-50%,-50%) scale(0.5);
    background: var(--neon2);
  }
  /* crosshair lines */
  #cursor-cross {
    position: fixed; top: 0; left: 0; z-index: 9998;
    pointer-events: none;
    width: 1px; height: 1px;
    transform: translate(-50%,-50%);
  }
  #cursor-cross::before, #cursor-cross::after {
    content: '';
    position: absolute;
    background: rgba(0,230,118,0.18);
    transition: opacity 0.3s;
  }
  #cursor-cross::before { width: 1px; height: 14px; top: -7px; left: 0; }
  #cursor-cross::after  { width: 14px; height: 1px; left: -7px; top: 0; }

  /* ── Animated Background ── */
  #bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── Grid Overlay ── */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,230,118,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,118,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ── Layout ── */
  .app {
    position: relative; z-index: 2;
    max-width: 880px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 52px 0 32px;
    position: relative;
  }
  .logo-wrap {
    display: inline-block;
    margin-bottom: 16px;
    position: relative;
  }
  .logo-wrap img {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--neon);
    box-shadow: 0 0 20px rgba(0,230,118,0.4), 0 0 60px rgba(0,230,118,0.1);
    filter: brightness(1.1) saturate(1.3);
  }
  .logo-placeholder {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--neon);
    box-shadow: 0 0 20px rgba(0,230,118,0.4), 0 0 60px rgba(0,230,118,0.1);
    background: linear-gradient(135deg, #021a0a, #011406);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    color: var(--neon);
    font-weight: 900;
  }
  .logo-ring {
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(0,230,118,0.3);
    animation: spin 8s linear infinite;
  }
  .logo-ring::before {
    content: '';
    position: absolute; top: -2px; left: 50%;
    width: 5px; height: 5px;
    background: var(--neon);
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 8px var(--neon);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 900;
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, var(--neon), var(--neon2), var(--neon));
    background-size: 200%;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    text-shadow: none;
    margin-bottom: 4px;
  }
  @keyframes shimmer { to { background-position: 200% center; } }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .scan-line {
    width: 180px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    margin: 18px auto 0;
    animation: scan-pulse 2s ease-in-out infinite;
  }
  @keyframes scan-pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* ── Glass Card ── */
  .card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 28px 28px 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity: 0.6;
  }
  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--neon);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── Form Elements ── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }

  label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    background: rgba(0,230,118,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus {
    border-color: var(--neon);
    background: rgba(0,230,118,0.08);
    box-shadow: 0 0 0 2px rgba(0,230,118,0.12), 0 0 14px rgba(0,230,118,0.08);
  }
  input::placeholder { color: rgba(208,255,232,0.2); }

  /* number spinner hide */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ── Semester Counter ── */
  .counter-row {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
  }
  .counter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    flex: 1;
  }
  .counter-ctrl {
    display: flex; align-items: center; gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .counter-btn {
    background: rgba(0,230,118,0.07);
    border: none;
    color: var(--neon);
    font-size: 18px;
    width: 36px; height: 36px;
    cursor: none;
    transition: background 0.15s;
    font-family: 'Orbitron', monospace;
    display: flex; align-items: center; justify-content: center;
  }
  .counter-btn:hover { background: rgba(0,230,118,0.16); }
  .counter-val {
    width: 42px; text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    color: var(--neon);
    background: rgba(0,6,2,0.5);
    height: 36px;
    line-height: 36px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* ── Subject Row ── */
  .subject-block {
    border: 1px solid rgba(0,230,118,0.1);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
    background: rgba(0,0,0,0.25);
    position: relative;
    transition: border-color 0.2s;
  }
  .subject-block:hover { border-color: rgba(0,230,118,0.25); }
  .subject-num {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--neon);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
    opacity: 0.7;
  }
  .subject-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 12px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 12px 28px;
    border: none;
    border-radius: 6px;
    cursor: none;
    transition: all 0.2s;
    font-weight: 700;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, rgba(0,230,118,0.15), rgba(105,255,71,0.15));
    border: 1px solid var(--neon);
    color: var(--neon);
    box-shadow: 0 0 18px rgba(0,230,118,0.2);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, rgba(0,230,118,0.28), rgba(105,255,71,0.22));
    box-shadow: 0 0 30px rgba(0,230,118,0.35);
    transform: translateY(-1px);
  }
  .btn-secondary {
    background: rgba(105,255,71,0.08);
    border: 1px solid rgba(105,255,71,0.35);
    color: var(--neon2);
  }
  .btn-secondary:hover {
    background: rgba(105,255,71,0.18);
    box-shadow: 0 0 18px rgba(105,255,71,0.25);
  }
  .btn-danger {
    background: rgba(255,45,107,0.08);
    border: 1px solid rgba(255,45,107,0.35);
    color: var(--danger);
  }
  .btn-danger:hover { background: rgba(255,45,107,0.18); }

  .btn-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-top: 8px;
  }

  /* ── Semester Tabs ── */
  .tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .tab {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 7px 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: none;
    transition: all 0.15s;
  }
  .tab.active {
    background: rgba(0,230,118,0.12);
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 0 10px rgba(0,230,118,0.18);
  }
  .tab:hover:not(.active) { border-color: rgba(0,230,118,0.3); color: var(--text); }

  /* ── Results ── */
  #results-section { display: none; }

  .gpa-display {
    text-align: center;
    padding: 30px 0;
  }
  .gpa-value {
    font-family: 'Orbitron', monospace;
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(0,230,118,0.5));
  }
  .gpa-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-top: 6px;
  }

  /* grade bar */
  .grade-bar-wrap {
    margin: 24px auto;
    max-width: 500px;
  }
  .grade-bar-bg {
    height: 6px;
    background: rgba(0,230,118,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .grade-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--neon2), var(--neon));
    box-shadow: 0 0 10px var(--neon);
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* ── Results Table ── */
  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
  }
  .result-table th {
    text-align: left;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  .result-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(0,230,118,0.06);
    color: var(--text);
    vertical-align: middle;
  }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table tr:hover td { background: rgba(0,230,118,0.03); }

  .grade-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .grade-A  { background: rgba(0,230,118,0.12); color: var(--neon); border: 1px solid rgba(0,230,118,0.3); }
  .grade-Am { background: rgba(105,255,71,0.1);  color: var(--neon2); border: 1px solid rgba(105,255,71,0.3); }
  .grade-Bp { background: rgba(105,255,71,0.07); color: #a0ff78;  border: 1px solid rgba(160,255,120,0.25); }
  .grade-B  { background: rgba(80,220,140,0.07); color: #b8ffaa; border: 1px solid rgba(80,220,140,0.2); }
  .grade-Bm { background: rgba(180,120,255,0.07); color: #c4a8ff; border: 1px solid rgba(180,120,255,0.2); }
  .grade-C  { background: rgba(255,184,0,0.07);  color: var(--warn); border: 1px solid rgba(255,184,0,0.25); }
  .grade-D  { background: rgba(255,100,0,0.07);  color: #ff8a4a; border: 1px solid rgba(255,100,0,0.2); }
  .grade-F  { background: rgba(255,45,107,0.1);  color: var(--danger); border: 1px solid rgba(255,45,107,0.3); }

  /* ── SGPA Pill Row ── */
  .sem-summary {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-top: 10px;
  }
  .sem-pill {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 18px;
    background: rgba(0,6,2,0.5);
    text-align: center;
    min-width: 100px;
    flex: 1;
  }
  .sem-pill-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .sem-pill-value {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--neon);
  }

  /* ── Section Divider ── */
  .section-sep {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 24px 0;
  }

  /* ── Alert ── */
  .alert {
    background: rgba(255,45,107,0.08);
    border: 1px solid rgba(255,45,107,0.3);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--danger);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    margin-bottom: 14px;
    display: none;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 40px 0 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(208,255,232,0.2);
    letter-spacing: 0.1em;
  }
  footer span { color: rgba(255,45,107,0.7); }

  /* ── Utility ── */
  .hidden { display: none !important; }
  .text-neon { color: var(--neon); }
  .text-right { text-align: right; }
  .mt-4 { margin-top: 4px; }
  .mt-16 { margin-top: 16px; }

  /* ── Scroll track ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #010204; }
  ::-webkit-scrollbar-thumb { background: rgba(0,230,118,0.2); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr 1fr; }
    .subject-grid { grid-template-columns: 1fr 1fr; }
    .subject-grid .subject-name { grid-column: 1/-1; }
    .card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div id="cursor-outer"></div>
<div id="cursor-cross"></div>
<div id="cursor-dot"></div>

<div class="app">

  <!-- Header -->
  <header>

    <div class="counter-row">
      <span class="counter-label">Number of Semesters</span>
      <div class="counter-ctrl">
        <button class="counter-btn" id="sem-dec">−</button>
        <div class="counter-val" id="sem-count">1</div>
        <button class="counter-btn" id="sem-inc">+</button>
      </div>
    </div>
    <button class="btn btn-primary" id="build-btn">BUILD SEMESTER SHEETS</button>
  </div>

  <!-- Dynamic Semester Sheets -->
  <div id="sem-sheets"></div>

  <!-- Alert -->
  <div class="alert" id="alert-box"></div>

  <!-- Calculate Button -->
  <div id="calc-wrap" class="hidden">
    <div class="btn-row">
      <button class="btn btn-primary" id="calc-btn">CALCULATE GPA</button>
      <button class="btn btn-danger" id="reset-btn">RESET</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results-section">
    <div class="section-sep"></div>

    <div class="card">
      <div class="card-title">CGPA Overview</div>
      <div class="gpa-display">
        <div class="gpa-value" id="cgpa-display">0.00</div>
        <div class="gpa-label">CUMULATIVE GRADE POINT AVERAGE / 4.00</div>
        <div class="grade-bar-wrap">
          <div class="grade-bar-bg">
            <div class="grade-bar-fill" id="grade-bar"></div>
          </div>
        </div>
      </div>
      <div class="sem-summary" id="sgpa-pills"></div>
    </div>

    <div class="card" id="detail-card">
      <div class="card-title">Detailed Results</div>
      <div class="tabs" id="result-tabs"></div>
      <div id="result-table-wrap"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    Built with <span>❤️</span> By HAMID, ARMAGHAN, BASIT, ABDULLAH &nbsp;·&nbsp; University of Haripur &nbsp;·&nbsp; COPYRIGHT 2026
  </footer>
</div>

<script>
/* ── Professional Cursor with smooth lerp ── */
const outer = document.getElementById('cursor-outer');
const dot   = document.getElementById('cursor-dot');
const cross = document.getElementById('cursor-cross');

let mx = 0, my = 0;          // actual mouse
let ox = 0, oy = 0;          // outer ring (lerped)
let rafId;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left  = mx + 'px';
  dot.style.top   = my + 'px';
  cross.style.left = mx + 'px';
  cross.style.top  = my + 'px';
});

(function lerp() {
  ox += (mx - ox) * 0.12;
  oy += (my - oy) * 0.12;
  outer.style.left = ox + 'px';
  outer.style.top  = oy + 'px';
  requestAnimationFrame(lerp);
})();

// hover detection
document.addEventListener('mouseover', e => {
  if (e.target.matches('button, input, .tab, .counter-btn')) {
    outer.classList.add('hovering');
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.matches('button, input, .tab, .counter-btn')) {
    outer.classList.remove('hovering');
  }
});

// click feedback
document.addEventListener('mousedown', () => dot.classList.add('clicking'));
document.addEventListener('mouseup',   () => dot.classList.remove('clicking'));

/* ── Background Particle Canvas ── */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const count = 80;
  particles = Array.from({length: count}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.3,
    vx: (Math.random() - 0.5) * 0.18,
    vy: (Math.random() - 0.5) * 0.18,
    a: Math.random() * 0.5 + 0.1
  }));

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // gradient nebula
    const grad = ctx.createRadialGradient(W*0.3, H*0.4, 0, W*0.3, H*0.4, W*0.55);
    grad.addColorStop(0, 'rgba(0,230,118,0.03)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const grad2 = ctx.createRadialGradient(W*0.75, H*0.7, 0, W*0.75, H*0.7, W*0.4);
    grad2.addColorStop(0, 'rgba(105,255,71,0.025)');
    grad2.addColorStop(1, 'transparent');
    ctx.fillStyle = grad2;
    ctx.fillRect(0, 0, W, H);

    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,230,118,${p.a})`;
      ctx.fill();
    });

    // connect nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0,230,118,${0.06 * (1 - dist/100)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Grading Table (University of Haripur) ── */
const GRADE_TABLE = [
  [85, 100, 4.00, 'A'],
  [84, 84, 3.90, 'A-'],
  [83, 83, 3.80, 'A-'],
  [82, 82, 3.70, 'A-'],
  [81, 81, 3.60, 'A-'],
  [80, 80, 3.50, 'A-'],
  [79, 79, 3.42, 'B+'],
  [78, 78, 3.33, 'B+'],
  [77, 77, 3.25, 'B+'],
  [76, 76, 3.17, 'B+'],
  [75, 75, 3.08, 'B+'],
  [74, 74, 3.00, 'B'],
  [73, 73, 2.92, 'B'],
  [72, 72, 2.83, 'B'],
  [71, 71, 2.75, 'B'],
  [70, 70, 2.67, 'B-'],
  [69, 69, 2.58, 'B-'],
  [68, 68, 2.50, 'B-'],
  [67, 67, 2.42, 'C+'],
  [66, 66, 2.33, 'C+'],
  [65, 65, 2.25, 'C+'],
  [64, 64, 2.17, 'C+'],
  [63, 63, 2.08, 'C'],
  [62, 62, 2.00, 'C'],
  [61, 61, 1.92, 'C'],
  [60, 60, 1.83, 'C-'],
  [59, 59, 1.75, 'C-'],
  [58, 58, 1.67, 'C-'],
  [57, 57, 1.58, 'D+'],
  [56, 56, 1.50, 'D+'],
  [55, 55, 1.42, 'D+'],
  [54, 54, 1.33, 'D+'],
  [53, 53, 1.25, 'D'],
  [52, 52, 1.17, 'D'],
  [51, 51, 1.08, 'D'],
  [50, 50, 1.00, 'D'],
  [0,  49, 0.00, 'F']
];

function getGrade(pct) {
  const p = Math.floor(pct); // UoH: fraction rounded to whole
  for (const [lo, hi, ng, letter] of GRADE_TABLE) {
    if (p >= lo && p <= hi) return { ng, letter };
  }
  return { ng: 0.00, letter: 'F' };
}

function gradeBadgeClass(letter) {
  if (letter === 'A')  return 'grade-A';
  if (letter === 'A-') return 'grade-Am';
  if (letter === 'B+') return 'grade-Bp';
  if (letter === 'B')  return 'grade-B';
  if (letter === 'B-') return 'grade-Bm';
  if (letter.startsWith('C')) return 'grade-C';
  if (letter.startsWith('D')) return 'grade-D';
  return 'grade-F';
}

/* ── Semester Counter ── */
let semCount = 1;
document.getElementById('sem-dec').addEventListener('click', () => {
  if (semCount > 1) { semCount--; document.getElementById('sem-count').textContent = semCount; }
});
document.getElementById('sem-inc').addEventListener('click', () => {
  if (semCount < 8) { semCount++; document.getElementById('sem-count').textContent = semCount; }
});

/* ── Build Semester Sheets ── */
document.getElementById('build-btn').addEventListener('click', buildSheets);

function buildSheets() {
  const sheets = document.getElementById('sem-sheets');
  sheets.innerHTML = '';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('calc-wrap').classList.remove('hidden');

  for (let s = 1; s <= semCount; s++) {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `sem-card-${s}`;

    let subjectsHTML = '';
    for (let j = 1; j <= 5; j++) {
      subjectsHTML += `
        <div class="subject-block" id="s${s}-sub${j}" ${j > 2 ? 'style="display:none"' : ''}>
          <div class="subject-num">SUBJECT ${j}</div>
          <div class="subject-grid">
            <div class="subject-name">
              <label>Subject Name</label>
              <input type="text" placeholder="e.g. Data Structures" id="s${s}-j${j}-name">
            </div>
            <div>
              <label>Credit Hours</label>
              <input type="number" placeholder="3" min="1" max="4" step="0.5" id="s${s}-j${j}-ch">
            </div>
            <div>
              <label>Marks / 100</label>
              <input type="number" placeholder="75" min="0" max="100" id="s${s}-j${j}-marks">
            </div>
          </div>
        </div>`;
    }

    card.innerHTML = `
      <div class="card-title">Semester ${s}</div>
      <div class="counter-row">
        <span class="counter-label">Subjects</span>
        <div class="counter-ctrl">
          <button class="counter-btn" onclick="adjSubjects(${s},-1)">−</button>
          <div class="counter-val" id="s${s}-subcount">2</div>
          <button class="counter-btn" onclick="adjSubjects(${s},+1)">+</button>
        </div>
      </div>
      ${subjectsHTML}
    `;
    sheets.appendChild(card);
  }
}

function adjSubjects(sem, delta) {
  const countEl = document.getElementById(`s${sem}-subcount`);
  let cur = parseInt(countEl.textContent);
  const next = Math.min(10, Math.max(2, cur + delta));
  if (next === cur) return;
  // show/hide (we pre-render 10 but store only 5 in DOM; expand as needed)
  for (let j = 1; j <= 10; j++) {
    // create if missing
    let el = document.getElementById(`s${sem}-sub${j}`);
    if (!el && j <= next) {
      const card = document.getElementById(`sem-card-${sem}`);
      el = document.createElement('div');
      el.className = 'subject-block';
      el.id = `s${sem}-sub${j}`;
      el.innerHTML = `
        <div class="subject-num">SUBJECT ${j}</div>
        <div class="subject-grid">
          <div class="subject-name">
            <label>Subject Name</label>
            <input type="text" placeholder="e.g. Data Structures" id="s${sem}-j${j}-name">
          </div>
          <div>
            <label>Credit Hours</label>
            <input type="number" placeholder="3" min="1" max="4" step="0.5" id="s${sem}-j${j}-ch">
          </div>
          <div>
            <label>Marks / 100</label>
            <input type="number" placeholder="75" min="0" max="100" id="s${sem}-j${j}-marks">
          </div>
        </div>`;
      card.appendChild(el);
    }
    if (el) el.style.display = j <= next ? '' : 'none';
  }
  countEl.textContent = next;
}

/* ── Alert ── */
function showAlert(msg) {
  const el = document.getElementById('alert-box');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

/* ── Calculate ── */
document.getElementById('calc-btn').addEventListener('click', calculate);

function calculate() {
  document.getElementById('alert-box').style.display = 'none';
  const results = [];

  for (let s = 1; s <= semCount; s++) {
    const countEl = document.getElementById(`s${s}-subcount`);
    if (!countEl) continue;
    const numSubj = parseInt(countEl.textContent);

    let totalCH = 0, totalGP = 0;
    const rows = [];

    for (let j = 1; j <= numSubj; j++) {
      const nameEl  = document.getElementById(`s${s}-j${j}-name`);
      const chEl    = document.getElementById(`s${s}-j${j}-ch`);
      const marksEl = document.getElementById(`s${s}-j${j}-marks`);
      if (!nameEl || !chEl || !marksEl) continue;

      const name  = nameEl.value.trim() || `Subject ${j}`;
      const ch    = parseFloat(chEl.value);
      const marks = parseFloat(marksEl.value);

      if (isNaN(ch) || ch < 1 || ch > 4) {
        showAlert(`Semester ${s} / Subject ${j}: Credit hours must be between 1 and 4.`);
        return;
      }
      if (isNaN(marks) || marks < 0 || marks > 100) {
        showAlert(`Semester ${s} / Subject ${j}: Marks must be between 0 and 100.`);
        return;
      }

      const grade = getGrade(marks);
      const gp    = grade.ng * ch;
      totalCH += ch;
      totalGP += gp;
      rows.push({ name, ch, marks, ng: grade.ng, letter: grade.letter, gp });
    }

    const sgpa = totalCH > 0 ? totalGP / totalCH : 0;
    results.push({ sem: s, rows, totalCH, totalGP, sgpa });
  }

  // CGPA
  let allCH = 0, allGP = 0;
  results.forEach(r => { allCH += r.totalCH; allGP += r.totalGP; });
  const cgpa = allCH > 0 ? allGP / allCH : 0;

  renderResults(results, cgpa);
}

function renderResults(results, cgpa) {
  // CGPA display
  document.getElementById('cgpa-display').textContent = cgpa.toFixed(2);
  const pct = (cgpa / 4.00) * 100;
  setTimeout(() => {
    document.getElementById('grade-bar').style.width = pct + '%';
  }, 100);

  // SGPA pills
  const pillsWrap = document.getElementById('sgpa-pills');
  pillsWrap.innerHTML = '';
  results.forEach(r => {
    const p = document.createElement('div');
    p.className = 'sem-pill';
    p.innerHTML = `
      <div class="sem-pill-label">SEM ${r.sem} SGPA</div>
      <div class="sem-pill-value">${r.sgpa.toFixed(2)}</div>`;
    pillsWrap.appendChild(p);
  });

  // Tabs + detail tables
  const tabs = document.getElementById('result-tabs');
  const tableWrap = document.getElementById('result-table-wrap');
  tabs.innerHTML = '';
  tableWrap.innerHTML = '';

  results.forEach((r, idx) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (idx === 0 ? ' active' : '');
    tab.textContent = `SEM ${r.sem}`;
    tab.addEventListener('click', () => {
      tabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      tableWrap.querySelectorAll('.sem-table').forEach(t => t.classList.add('hidden'));
      document.getElementById(`sem-table-${r.sem}`).classList.remove('hidden');
    });
    tabs.appendChild(tab);

    // Table
    const div = document.createElement('div');
    div.className = 'sem-table' + (idx > 0 ? ' hidden' : '');
    div.id = `sem-table-${r.sem}`;

    let rows = r.rows.map(row => `
      <tr>
        <td>${row.name}</td>
        <td class="text-right">${row.marks.toFixed(1)}</td>
        <td class="text-right">${row.ch.toFixed(1)}</td>
        <td class="text-right">${row.ng.toFixed(2)}</td>
        <td><span class="grade-badge ${gradeBadgeClass(row.letter)}">${row.letter}</span></td>
        <td class="text-right text-neon">${row.gp.toFixed(2)}</td>
      </tr>`).join('');

    div.innerHTML = `
      <table class="result-table">
        <thead>
          <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>CH</th>
            <th>NG</th>
            <th>Grade</th>
            <th>Grade Pts</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr>
            <td colspan="2"></td>
            <td class="text-right"><strong>${r.totalCH.toFixed(1)}</strong></td>
            <td></td>
            <td></td>
            <td class="text-right"><strong class="text-neon">${r.totalGP.toFixed(2)}</strong></td>
          </tr>
          <tr>
            <td colspan="6" style="padding-top:12px; font-family:'Orbitron',monospace; font-size:11px; letter-spacing:.15em; color:var(--neon);">
              SGPA : ${r.sgpa.toFixed(2)} / 4.00
            </td>
          </tr>
        </tfoot>
      </table>`;
    tableWrap.appendChild(div);
  });

  document.getElementById('results-section').style.display = 'block';
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── Reset ── */
document.getElementById('reset-btn').addEventListener('click', () => {
  document.getElementById('sem-sheets').innerHTML = '';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('calc-wrap').classList.add('hidden');
  document.getElementById('grade-bar').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Build default on load
window.addEventListener('load', buildSheets);
</script>
